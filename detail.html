{% extends "base.html" %}

{% block content %}
<article class="entry-detail">
    <h2>{{ entry.title }}</h2>
    <p class="date">{{ entry.date }}</p>
    <div class="content">
        {{ entry.content | replace('\n', '<br>') | safe }}
    </div>
    <div class="actions">
        <a href="{{ url_for('edit_entry', entry_id=entry.id) }}">✏️ Редактировать</a>
        <form action="{{ url_for('delete_entry', entry_id=entry.id) }}" method="POST" style="display: inline;">
            <button type="submit" class="delete-btn" onclick="return confirm('Удалить запись?')">🗑️ Удалить</button>
        </form>
        <a href="{{ url_for('index') }}">🏠 На главную</a>
    </div>
</article>
{% endblock %}
